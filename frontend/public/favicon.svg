<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Global gradient spanning the full 512x512 space -->
    <linearGradient id="logoGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#5438FF" />
    </linearGradient>
  </defs>

  <g transform="translate(256, 256)">
    <!-- Maximum scale </>, fills the entire bounds for perfect favicon visibility -->
    <g fill="none" stroke="url(#logoGrad)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left Bracket -->
      <path d="M -100 -160 L -220 0 L -100 160" />
      
      <!-- Forward Slash -->
      <path d="M -30 200 L 30 -200" />
      
      <!-- Right Bracket -->
      <path d="M 100 -160 L 220 0 L 100 160" />
    </g>
  </g>
</svg>
